<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Log in — WorkoutTracker</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">Workout<span>Tracker</span></div>
    <div class="card">
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Log in to your account</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Log in</button>
    </div>
    <div class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></div>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>redirectIfLoggedIn();</script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>redirectIfLoggedIn();</script></body>
</html>
