<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — WorkoutTracker</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <link rel="stylesheet" href="/static/css/components.css"/>
  <link rel="stylesheet" href="/static/css/components.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Workout<span>Tracker</span></div>
      <nav>
        <div class="nav-item" onclick="window.location.href='/static/pages/dashboard.html'"><span class="nav-icon">&#9632;</span> Dashboard</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/workouts.html'"><span class="nav-icon">&#9651;</span> Workouts</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/create-workout.html'"><span class="nav-icon">&#43;</span> New workout</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/reports.html'"><span class="nav-icon">&#9636;</span> Reports</div>
        <div class="nav-item active" onclick="window.location.href='/static/pages/profile.html'"><span class="nav-icon">&#9675;</span> Profile</div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="avatar">?</div>
          <div>
            <div class="user-name">—</div>
            <div class="user-email">—</div>
          </div>
        </div>
        <button class="btn-secondary btn-sm" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1>Profile</h1>
      </div>

      <div class="card" style="max-width:560px">
        <div class="section-title">Account info</div>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" placeholder="Your name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" disabled/>
        </div>
        <div class="form-group">
          <label>Member since</label>
          <input type="text" id="memberSince" disabled/>
        </div>
      </div>

      <div class="card" style="max-width:560px;margin-top:24px">
        <div class="section-title">Change password</div>
        <div class="form-group">
          <label>New password</label>
          <input type="password" id="newPassword" placeholder="Min 8 characters"/>
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password"/>
        </div>
        <button class="btn-primary" id="pwBtn" onclick="changePassword()">Update password</button>
      </div>
    </main>
  </div>

  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/profile.js"></script>
</body>
</html>
