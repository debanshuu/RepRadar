<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign up — WorkoutTracker</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="auth-box">
    <div class="auth-logo">Workout<span>Tracker</span></div>
    <div class="card">
      <h1>Create account</h1>
      <p class="auth-subtitle">Start tracking your workouts today</p>
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" placeholder="Alex Johnson"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 8 characters"/>
      </div>
      <button class="btn-primary" id="registerBtn" onclick="handleRegister()">Create account</button>
    </div>
    <div class="auth-footer">Already have an account? <a href="login.html">Log in</a></div>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>redirectIfLoggedIn();</script>
  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>redirectIfLoggedIn();</script>
</body>
</html>
