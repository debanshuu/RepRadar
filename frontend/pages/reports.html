<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reports — WorkoutTracker</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Workout<span>Tracker</span></div>
      <nav>
        <div class="nav-item" onclick="window.location.href='/static/pages/dashboard.html'"><span class="nav-icon">&#9632;</span> Dashboard</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/workouts.html'"><span class="nav-icon">&#9651;</span> Workouts</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/create-workout.html'"><span class="nav-icon">&#43;</span> New workout</div>
        <div class="nav-item active" onclick="window.location.href='/static/pages/reports.html'"><span class="nav-icon">&#9636;</span> Reports</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/profile.html'"><span class="nav-icon">&#9675;</span> Profile</div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="avatar">?</div>
          <div>
            <div class="user-name">—</div>
            <div class="user-email">—</div>
          </div>
        </div>
        <button class="btn-secondary btn-sm" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1>Reports</h1>
      </div>

      <div class="report-grid">
        <div class="report-card">
          <h3>Total workouts</h3>
          <div class="value primary" id="totalWorkouts">—</div>
        </div>
        <div class="report-card">
          <h3>Completed</h3>
          <div class="value success" id="totalCompleted">—</div>
        </div>
        <div class="report-card">
          <h3>Completion rate</h3>
          <div class="value" id="completionRate">—</div>
        </div>
        <div class="report-card">
          <h3>This month</h3>
          <div class="value primary" id="monthlyTotal">—</div>
        </div>
        <div class="report-card">
          <h3>Completed this month</h3>
          <div class="value success" id="monthlyCompleted">—</div>
        </div>
        <div class="report-card">
          <h3>Monthly rate</h3>
          <div class="value" id="monthlyRate">—</div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Strength progress</div>
        <div id="progressList"><div class="empty-state"><h3>No data yet</h3><p>Complete some workouts to see progress</p></div></div>
      </div>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/reports.js"></script>
</body>
</html>
