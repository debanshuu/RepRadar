<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workouts — WorkoutTracker</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    .layout { display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: var(--bg-card); border-right: 1px solid var(--border); padding: 24px 0; display: flex; flex-direction: column; position: fixed; height: 100vh; }
    .sidebar-logo { font-size: 18px; font-weight: 700; padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .sidebar-logo span { color: var(--primary); }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 24px; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-item.active { color: var(--primary); border-left-color: var(--primary); background: rgba(99,102,241,0.08); }
    .nav-icon { width: 18px; text-align: center; font-size: 16px; }
    .sidebar-bottom { margin-top: auto; padding: 16px 24px; border-top: 1px solid var(--border); }
    .main { margin-left: 240px; padding: 40px; flex: 1; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .page-header h1 { font-size: 28px; font-weight: 700; }
    .filters { display: flex; gap: 12px; margin-bottom: 24px; }
    .filters input { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 14px; width: 260px; }
    .filters input:focus { outline: none; border-color: var(--primary); }
    .filters select { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; color: var(--text); font-size: 14px; }
    .workout-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
    .workout-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color 0.2s; cursor: pointer; }
    .workout-card:hover { border-color: var(--primary); }
    .workout-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .workout-card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .workout-card-date { font-size: 12px; color: var(--text-muted); }
    .workout-card-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
    .workout-card-footer { display: flex; justify-content: space-between; align-items: center; }
    .exercise-count { font-size: 12px; color: var(--text-muted); }
    .card-actions { display: flex; gap: 8px; }
    .btn-xs { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; }
    .user-name { font-size: 13px; font-weight: 500; }
    .user-email { font-size: 11px; color: var(--text-muted); }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Workout<span>Tracker</span></div>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><span class="nav-icon">&#9632;</span> Dashboard</div>
        <div class="nav-item active" onclick="window.location.href='workouts.html'"><span class="nav-icon">&#9651;</span> Workouts</div>
        <div class="nav-item" onclick="window.location.href='create-workout.html'"><span class="nav-icon">&#43;</span> New workout</div>
        <div class="nav-item" onclick="window.location.href='reports.html'"><span class="nav-icon">&#9636;</span> Reports</div>
        <div class="nav-item" onclick="window.location.href='profile.html'"><span class="nav-icon">&#9675;</span> Profile</div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-info" style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div class="avatar">?</div>
          <div>
            <div class="user-name" id="sidebarName">—</div>
            <div class="user-email" id="sidebarEmail">—</div>
          </div>
        </div>
        <button class="btn-secondary btn-sm" style="width:100%" onclick="logout()">Log out</button>
      </div>
    </aside>

    <main class="main">
      <div class="page-header">
        <h1>Workouts</h1>
        <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="window.location.href='create-workout.html'">+ New workout</button>
      </div>

      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search workouts..." oninput="filterWorkouts()"/>
        <select id="statusFilter" onchange="filterWorkouts()">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="workout-grid" id="workoutGrid">
        <div class="empty-state"><h3>Loading...</h3></div>
      </div>
    </main>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    requireAuth();
    let allWorkouts = [];

    async function loadWorkouts() {
      const res = await getWorkouts();
      allWorkouts = await res.json();
      renderWorkouts(allWorkouts);
    }

    function filterWorkouts() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const status = document.getElementById("statusFilter").value;
      const filtered = allWorkouts.filter(w => {
        const matchSearch = w.title.toLowerCase().includes(search);
        const matchStatus = !status || w.status === status;
        return matchSearch && matchStatus;
      });
      renderWorkouts(filtered);
    }

    function renderWorkouts(workouts) {
      const grid = document.getElementById("workoutGrid");
      if (!workouts.length) {
        grid.innerHTML = '<div class="empty-state"><h3>No workouts found</h3><p>Create one to get started</p></div>';
        return;
      }
      grid.innerHTML = workouts.map(w => `
        <div class="workout-card" onclick="window.location.href='workout-detail.html?id=${w.id}'">
          <div class="workout-card-header">
            <div>
              <div class="workout-card-title">${w.title}</div>
              <div class="workout-card-date">${formatDate(w.scheduled_date)} ${w.scheduled_time ? "· " + w.scheduled_time : ""}</div>
            </div>
            <span class="badge badge-${w.status}">${w.status}</span>
          </div>
          <div class="workout-card-desc">${w.description || "No description"}</div>
          <div class="workout-card-footer">
            <span class="exercise-count">${w.exercises.length} exercise${w.exercises.length !== 1 ? "s" : ""}</span>
            <div class="card-actions" onclick="event.stopPropagation()">
              ${w.status === "pending" ? `<button class="btn-primary btn-xs" onclick="markDone(${w.id})">Mark done</button>` : ""}
              <button class="btn-secondary btn-xs" onclick="window.location.href='edit-workout.html?id=${w.id}'">Edit</button>
              <button class="btn-danger btn-xs" onclick="removeWorkout(${w.id})">Delete</button>
            </div>
          </div>
        </div>`).join("");
    }

    async function markDone(id) {
      await completeWorkout(id);
      showToast("Workout completed!");
      loadWorkouts();
    }

    async function removeWorkout(id) {
      if (!confirm("Delete this workout?")) return;
      await deleteWorkout(id);
      showToast("Workout deleted");
      loadWorkouts();
    }

    loadWorkouts();
  </script>
</body>
</html>
