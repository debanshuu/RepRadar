<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workouts — WorkoutTracker</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <link rel="stylesheet" href="/static/css/components.css"/>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">Workout<span>Tracker</span></div>
      <nav>
        <div class="nav-item" onclick="window.location.href='/static/pages/dashboard.html'"><span class="nav-icon">&#9632;</span> Dashboard</div>
        <div class="nav-item active" onclick="window.location.href='/static/pages/workouts.html'"><span class="nav-icon">&#9651;</span> Workouts</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/create-workout.html'"><span class="nav-icon">&#43;</span> New workout</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/reports.html'"><span class="nav-icon">&#9636;</span> Reports</div>
        <div class="nav-item" onclick="window.location.href='/static/pages/profile.html'"><span class="nav-icon">&#9675;</span> Profile</div>
      </nav>
      <div class="sidebar-bottom">
        <div class="user-info">
          <div class="avatar">?</div>
          <div>
            <div class="user-name">—</div>
            <div class="user-email">—</div>
          </div>
        </div>
        <button class="btn-secondary btn-sm" style="width:100%" onclick="logout()">Log out</button>
      </div>
    </aside>
    <main class="main">
      <div class="page-header">
        <h1>Workouts</h1>
        <button class="btn-primary" style="width:auto;padding:10px 20px" onclick="window.location.href='/static/pages/create-workout.html'">+ New workout</button>
      </div>
      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search workouts..." oninput="filterWorkouts()"/>
        <select id="statusFilter" onchange="filterWorkouts()">
          <option value="">All statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="workout-grid" id="workoutGrid">
        <div class="empty-state"><h3>Loading...</h3></div>
      </div>
    </main>
  </div>
  <script src="/static/js/utils.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/workouts.js"></script>
</body>
</html>
